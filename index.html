<!DOCTYPE html>
<html>
<body>
<h1>Screen Share Stream</h1>
<p>Open <a href="/viewer" target="_blank" rel="noopener">viewer page</a> in another tab/device to watch.</p>
<video id="video" autoplay playsinline></video>
<div style="margin-top: 12px;">
  <button id="startBtn">Start Screen Share</button>
    <button id="stopBtn" disabled>Stop</button>
  <p id="status"></p>
</div>

<script>
const videoEl = document.getElementById("video");
const statusEl = document.getElementById("status");
const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");

let stream;
let ws;
let recorder;

function bestMimeType() {
    const candidates = [
        "video/webm;codecs=vp9,opus",
        "video/webm;codecs=vp8,opus",
        "video/webm"
    ];
    return candidates.find((m) => MediaRecorder.isTypeSupported(m)) || "";
}

async function start() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
        throw new Error("Screen capture API unavailable in this browser/context.");
    }

    statusEl.textContent = "Requesting screen capture permission...";
    stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
    videoEl.srcObject = stream;

    const protocol = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${protocol}://${location.host}/ws/broadcast`);
    ws.binaryType = "arraybuffer";

    await new Promise((resolve, reject) => {
        ws.onopen = resolve;
        ws.onerror = () => reject(new Error("WebSocket connection failed"));
    });

    const mimeType = bestMimeType();
    recorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);

    recorder.ondataavailable = async (event) => {
        if (!event.data || event.data.size === 0 || ws.readyState !== WebSocket.OPEN) {
            return;
        }
        const chunk = await event.data.arrayBuffer();
        ws.send(chunk);
    };

    recorder.onerror = () => {
        statusEl.textContent = "Recorder error. Please restart sharing.";
    };

    stream.getVideoTracks().forEach((track) => {
        track.onended = () => stop();
    });

    // Small timeslice keeps latency low while remaining stable.
    recorder.start(250);
    startBtn.disabled = true;
    stopBtn.disabled = false;
    statusEl.textContent = "Sharing over WebSocket.";
}

function stop() {
    if (recorder && recorder.state !== "inactive") {
        recorder.stop();
    }
    recorder = undefined;

    if (ws && ws.readyState <= WebSocket.OPEN) {
        ws.close();
    }
    ws = undefined;

    if (stream) {
        stream.getTracks().forEach((track) => track.stop());
    }
    stream = undefined;
    videoEl.srcObject = null;

    startBtn.disabled = false;
    stopBtn.disabled = true;
    statusEl.textContent = "Stopped.";
}

startBtn.addEventListener("click", async () => {
    try {
        await start();
    } catch (err) {
        statusEl.textContent = "Screen share failed: " + (err && err.message ? err.message : String(err));
    }
});

stopBtn.addEventListener("click", stop);
</script>
</body>
</html>
