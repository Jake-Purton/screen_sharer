<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Screen Share – Sender</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; max-width: 960px; margin: 2rem auto; padding: 0 1.5rem; background: #f5f5f5; color: #222; }
  video { width: 100%; aspect-ratio: 16/9; background: #111; border-radius: 6px; display: block; }
  .bar { display: flex; gap: .75rem; align-items: center; margin: .75rem 0; flex-wrap: wrap; }
  button { padding: .45rem .9rem; font-size: .9rem; border-radius: 4px; border: 1px solid #bbb; background: #fff; cursor: pointer; }
  button:disabled { opacity: .4; cursor: default; }
  #startBtn { background: #1a73e8; color: #fff; border-color: #1a73e8; }
  #stopBtn  { background: #d93025; color: #fff; border-color: #d93025; }
  #status   { font-size: .85rem; color: #555; margin: 0; }
</style>
</head>
<body>
<h1>Screen Share – Sender</h1>
<p>Open the <a href="/viewer" target="_blank" rel="noopener">viewer page</a> in another tab or device.</p>
<video id="video" autoplay playsinline muted></video>
<div class="bar">
  <button id="startBtn">&#9654; Start sharing</button>
  <button id="stopBtn" disabled>&#9632; Stop</button>
  <span id="status">Idle.</span>
</div>

<script type="module">
/**
 * Low-latency screen sharing sender.
 *
 * Pipeline:
 *   getDisplayMedia
 *     → MediaStreamTrackProcessor  (raw VideoFrames)
 *     → VideoEncoder               (VP9, latencyMode:'realtime')
 *     → webm-muxer StreamTarget    (chunked:true → one WebM Cluster per callback)
 *     → WebSocket binary send
 *
 * Latency tuning
 * ──────────────
 * KEYFRAME_EVERY = 5 frames forces a new keyframe (and therefore a new WebM
 * Cluster) every ~167 ms at 30 fps.  webm-muxer flushes a complete Cluster to
 * onChunk() at each keyframe boundary, so chunks arrive at the server at that
 * cadence.  Combined with network and decode time the total end-to-end latency
 * is well under 300 ms.
 *
 * Browser support: Chrome 94+, Firefox 130+.  Safari requires H.264 and is
 * not supported by this VP9/WebM pipeline.
 */
import { Muxer, StreamTarget } from '/webm-muxer.mjs';

const videoEl  = document.getElementById('video');
const statusEl = document.getElementById('status');
const startBtn = document.getElementById('startBtn');
const stopBtn  = document.getElementById('stopBtn');

/**
 * Keyframe interval in frames.
 * Lower → more frequent chunk flushes → lower latency, higher bitrate.
 * 5 frames @ 30 fps ≈ 167 ms per WebSocket send.
 */
const KEYFRAME_EVERY = 5;

let stream, ws, encoder, muxer, frameReader;
let frameCount = 0;
let running    = false;

// ── Feature detection ────────────────────────────────────────────────────────
function checkSupport() {
  const isLocalhost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent)
    || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

  if (!isLocalhost && !window.isSecureContext) {
    throw new Error('Screen capture requires a secure origin (HTTPS). Use https://... or run from localhost.');
  }

  if (!navigator.mediaDevices?.getDisplayMedia) {
    if (isIOS) {
      throw new Error('iPad/iPhone browsers use WebKit (including Chrome on iPad). This app\'s capture pipeline is not supported on iOS. Use desktop Chrome/Firefox.');
    }
    throw new Error('getDisplayMedia is unavailable in this browser or origin. Use HTTPS and desktop Chrome/Firefox.');
  }

  if (typeof VideoEncoder === 'undefined') {
    if (isIOS) {
      throw new Error('WebCodecs (VideoEncoder) is unavailable on iOS WebKit for this app. Use desktop Chrome/Firefox.');
    }
    throw new Error('WebCodecs (VideoEncoder) not available. Use Chrome 94+ or Firefox 130+.');
  }

  if (typeof MediaStreamTrackProcessor === 'undefined') {
    throw new Error('MediaStreamTrackProcessor not available. Use desktop Chrome/Firefox.');
  }
}

// ── Start ────────────────────────────────────────────────────────────────────
async function start() {
  checkSupport();
  running = true;
  startBtn.disabled = true;
  setStatus('Requesting screen capture…');

  // 1. Capture screen
  stream = await navigator.mediaDevices.getDisplayMedia({
    video: { frameRate: { ideal: 30, max: 30 }, width: { ideal: 1920 }, height: { ideal: 1080 } },
    audio: false,
  });
  videoEl.srcObject = stream;

  const track   = stream.getVideoTracks()[0];
  const width   = track.getSettings().width  || 1280;
  const height  = track.getSettings().height || 720;

  // 2. Open WebSocket to relay server
  setStatus('Connecting to relay…');
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/broadcast`);
  ws.binaryType = 'arraybuffer';

  await new Promise((resolve, reject) => {
    ws.onopen  = resolve;
    ws.onerror = () => reject(new Error('WebSocket connection failed'));
  });

  ws.onmessage = (e) => {
    if (typeof e.data !== 'string') return;
    try {
      const m = JSON.parse(e.data);
      if (m.type === 'ready') setStatus(`Live – ${m.viewers} viewer(s) connected`);
    } catch { /* non-JSON, ignore */ }
  };
  ws.onclose = () => { if (running) stop(); };

  // 3. Create webm-muxer with StreamTarget
  //    onHeader: EBML + Tracks (sent once at start, identifies the format)
  //    onCluster: individual WebM Clusters (media segments, sent frequently)
  let headerSent = false;
  
  muxer = new Muxer({
    target: new StreamTarget({
      onHeader(data, position) {
        console.log(`[Sender] Init segment: ${data.byteLength} bytes`);
        if (ws.readyState === WebSocket.OPEN) {
          // Send init segment prefixed with a marker so viewer knows it's the header
          const msg = new ArrayBuffer(data.byteLength + 1);
          const view = new Uint8Array(msg);
          view[0] = 0xFF;  // marker for init segment
          view.set(data, 1);
          ws.send(msg);
          console.log('[Sender] Init segment sent');
        }
        headerSent = true;
      },
      onCluster(data, position, timestamp) {
        // Send cluster without marker so it's treated as media data
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(data);
          console.log(`[Sender] Cluster ${Math.floor(timestamp)}ms: ${data.byteLength} bytes`);
        }
      },
    }),
    video: {
      codec:     'V_VP9',
      width,
      height,
      frameRate: 30,
    },
    firstTimestampBehavior: 'offset',
  });

  // 4. Configure VideoEncoder
  //    latencyMode:'realtime' disables look-ahead buffering in the codec,
  //    keeping per-frame encode latency minimal.
  encoder = new VideoEncoder({
    output: (chunk, meta) => {
      console.log(`[Sender] Encoded frame: ${chunk.byteLength} bytes, ts=${chunk.timestamp}`);
      muxer.addVideoChunk(chunk, meta);
    },
    error:  (e) => { console.error('VideoEncoder:', e); if (running) stop(); },
  });
  encoder.configure({
    codec:       'vp09.00.10.08',   // VP9 profile 0, 8-bit
    width,
    height,
    bitrate:     2_000_000,         // 2 Mbps; screen content compresses well
    framerate:   30,
    latencyMode: 'realtime',
    bitrateMode: 'variable',
  });

  // 5. Pull raw frames from the track and feed them to the encoder
  const processor = new MediaStreamTrackProcessor({ track });
  frameReader = processor.readable.getReader();

  (async () => {
    try {
      for (;;) {
        const { done, value: frame } = await frameReader.read();
        if (done) break;

        // Drop frames when the encoder queue is backing up to prevent latency
        // from accumulating.
        if (encoder.encodeQueueSize > 2) {
          console.log(`[Sender] Dropping frame (queue size: ${encoder.encodeQueueSize})`);
          frame.close();
          continue;
        }

        const isKeyFrame = frameCount % KEYFRAME_EVERY === 0;
        if (isKeyFrame) console.log(`[Sender] Requesting keyframe at frame ${frameCount}`);
        encoder.encode(frame, { keyFrame: isKeyFrame });
        frame.close();
        frameCount++;
      }
    } catch (e) {
      if (e?.name !== 'AbortError') console.error('Frame reader error:', e);
    }
  })();

  track.addEventListener('ended', stop, { once: true });
  stopBtn.disabled = false;
  setStatus('Live – waiting for viewers…');
}

// ── Stop / cleanup ───────────────────────────────────────────────────────────
async function stop() {
  if (!running) return;
  running = false;
  startBtn.disabled = false;
  stopBtn.disabled  = true;
  setStatus('Stopping…');

  try { await frameReader?.cancel(); } catch { /* ignore */ }
  frameReader = undefined;

  if (encoder && encoder.state !== 'closed') {
    try { await encoder.flush(); } catch { /* ignore */ }
    encoder.close();
  }
  encoder = undefined;

  try { muxer?.finalize(); } catch { /* ignore */ }
  muxer = undefined;

  if (ws && ws.readyState <= WebSocket.OPEN) ws.close();
  ws = undefined;

  stream?.getTracks().forEach((t) => t.stop());
  stream = undefined;
  videoEl.srcObject = null;

  frameCount = 0;
  setStatus('Stopped.');
}

function setStatus(msg) { statusEl.textContent = msg; }

startBtn.addEventListener('click', () => start().catch((e) => setStatus(`Error: ${e.message}`)));
stopBtn.addEventListener('click',  stop);
</script>
</body>
</html>
