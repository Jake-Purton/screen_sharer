<!DOCTYPE html>
<html>
<body>
<h1>Screen Share Stream</h1>
<p>Open <a href="/viewer" target="_blank" rel="noopener">viewer page</a> in another tab/device to watch.</p>
<video id="video" autoplay playsinline></video>
<div style="margin-top: 12px;">
  <button id="startBtn">Start Screen Share</button>
  <p id="status"></p>
</div>

<script>
function setPreferredVideoCodec(transceiver) {
    const caps = RTCRtpSender.getCapabilities("video");
    if (!caps || !caps.codecs) return;

    const preferredOrder = ["video/AV1", "video/VP9", "video/H264", "video/VP8"];
    const codecs = [];

    preferredOrder.forEach((mimeType) => {
        caps.codecs.forEach((codec) => {
            if (codec.mimeType === mimeType) {
                codecs.push(codec);
            }
        });
    });

    if (codecs.length > 0) {
        transceiver.setCodecPreferences(codecs);
    }
}

async function tuneSender(sender, kind) {
    const params = sender.getParameters() || {};
    if (!params.encodings || params.encodings.length === 0) {
        params.encodings = [{}];
    }

    if (kind === "video") {
        params.degradationPreference = "maintain-resolution";
        params.encodings[0].maxBitrate = 12000000;
        params.encodings[0].maxFramerate = 60;
        params.encodings[0].scaleResolutionDownBy = 1;
    }

    if (kind === "audio") {
        params.encodings[0].maxBitrate = 192000;
    }

    try {
        await sender.setParameters(params);
    } catch (err) {
        // Some browsers reject unsupported params; keep streaming with defaults.
        console.warn("setParameters failed:", err);
    }
}

async function start() {
    const pc = new RTCPeerConnection();
    const videoEl = document.getElementById("video");
    const statusEl = document.getElementById("status");

    statusEl.textContent = "Requesting screen capture permission...";

    pc.ontrack = (event) => {
        videoEl.srcObject = event.streams[0];
    };

    // Ask browser for screen + audio
    const stream = await navigator.mediaDevices.getDisplayMedia({
        video: {
            width: { ideal: 3840, max: 3840 },
            height: { ideal: 2160, max: 2160 },
            frameRate: { ideal: 60, max: 60 }
        },
        audio: {
            sampleRate: 48000,
            channelCount: 2,
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false
        }
    });

    const videoTrack = stream.getVideoTracks()[0];
    if (videoTrack) {
        videoTrack.contentHint = "detail";
        try {
            await videoTrack.applyConstraints({
                width: { ideal: 3840, max: 3840 },
                height: { ideal: 2160, max: 2160 },
                frameRate: { ideal: 60, max: 60 }
            });
        } catch (err) {
            console.warn("Video constraints fallback:", err);
        }
    }

    const senders = [];
    stream.getTracks().forEach((track) => {
        const transceiver = pc.addTransceiver(track, { direction: "sendonly" });
        if (track.kind === "video") {
            setPreferredVideoCodec(transceiver);
        }
        senders.push(transceiver.sender);
    });

    await Promise.all(
        senders.map((sender) => tuneSender(sender, sender.track ? sender.track.kind : "video"))
    );

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    const resp = await fetch("/offer/broadcast", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({sdp: offer.sdp, type: offer.type})
    });

    if (!resp.ok) {
        throw new Error("Broadcast offer failed with status " + resp.status);
    }

    const answer = await resp.json();
    await pc.setRemoteDescription(answer);

    statusEl.textContent = "Sharing started at best available quality.";
}

document.getElementById("startBtn").addEventListener("click", async () => {
    try {
        await start();
    } catch (err) {
        document.getElementById("status").textContent =
            "Screen share failed: " + (err && err.message ? err.message : String(err));
    }
});
</script>
</body>
</html>
