<!DOCTYPE html>
<html>
<body>
<h1>Screen Share Stream</h1>
<p>Open <a href="/viewer" target="_blank" rel="noopener">viewer page</a> in another tab/device to watch.</p>
<video id="video" autoplay playsinline></video>
<div style="margin-top: 12px;">
  <button id="startBtn">Start Screen Share</button>
  <p id="status"></p>
</div>

<script>
function getDisplayMediaFn() {
    if (navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia) {
        return (constraints) => navigator.mediaDevices.getDisplayMedia(constraints);
    }
    if (navigator.getDisplayMedia) {
        return (constraints) => navigator.getDisplayMedia(constraints);
    }
    return null;
}

async function start() {
    const pc = new RTCPeerConnection();
    const videoEl = document.getElementById("video");
    const statusEl = document.getElementById("status");
    const getDisplayMedia = getDisplayMediaFn();

    statusEl.textContent = "Requesting screen capture permission...";

    if (!getDisplayMedia) {
        throw new Error(
            "This browser/context does not support screen capture. Use Chrome/Edge/Safari and open via http://localhost:8080 or HTTPS."
        );
    }

    pc.ontrack = (event) => {
        videoEl.srcObject = event.streams[0];
    };

    // Ask browser for screen + audio
    const stream = await getDisplayMedia({
        video: true,
        audio: true
    });

    stream.getTracks().forEach(track => pc.addTrack(track, stream));

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    const resp = await fetch("/offer/broadcast", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({sdp: offer.sdp, type: offer.type})
    });

    if (!resp.ok) {
        throw new Error("Broadcast offer failed with status " + resp.status);
    }

    const answer = await resp.json();
    await pc.setRemoteDescription(answer);

    statusEl.textContent = "Sharing started.";
}

document.getElementById("startBtn").addEventListener("click", async () => {
    try {
        await start();
    } catch (err) {
        document.getElementById("status").textContent =
            "Screen share failed: " + (err && err.message ? err.message : String(err));
    }
});

if (!getDisplayMediaFn()) {
    document.getElementById("status").textContent =
        "Screen capture API not available in this browser/context.";
}
</script>
</body>
</html>
